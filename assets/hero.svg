<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="glow" cx="120" cy="100" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#da291c" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#da291c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="379" rx="0" fill="none" stroke="#1c2330"/>

  <!-- Prompt mark: a terminal chevron + cursor on the red handle (no cross). -->
  <rect x="64" y="60" width="76" height="76" rx="17" fill="#da291c"/>
  <g transform="translate(64,60) scale(0.76)">
    <path d="M30 34 L54 50 L30 66" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="62" y="41" width="13" height="18" rx="3" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="158" y="112" font-size="58" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#f0f6fc">swiss</tspan><tspan fill="#ff5a4d">code</tspan>
  </text>
  <text x="160" y="150" font-size="19" font-weight="600" fill="#c9d1d9">Drop-in launcher for Claude Code, Kilo &amp; OpenCode</text>
  <text x="160" y="177" font-size="15" fill="#7d8590">one binary &#183; any provider &#183; no proxy, no daemon, no shell aliases</text>

  <!-- Terminal card -->
  <g>
    <rect x="662" y="58" width="474" height="196" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="686" cy="80" r="5" fill="#ff5f56"/>
    <circle cx="704" cy="80" r="5" fill="#ffbd2e"/>
    <circle cx="722" cy="80" r="5" fill="#27c93f"/>
    <text x="899" y="84" font-size="12" fill="#6e7681" text-anchor="middle" font-family="Menlo, monospace">swisscode — zsh</text>
    <line x1="662" y1="98" x2="1136" y2="98" stroke="#21262d"/>
    <g font-family="Menlo, 'DejaVu Sans Mono', monospace" font-size="15" xml:space="preserve">
      <text x="684" y="128"><tspan fill="#27c93f">$</tspan><tspan fill="#c9d1d9"> swisscode </tspan><tspan fill="#ff8a80">--cc-agent</tspan><tspan fill="#c9d1d9"> opencode</tspan></text>
      <text x="684" y="156" fill="#8b949e">swisscode: profile "work"</text>
      <text x="684" y="180"><tspan fill="#8b949e">  &#8594; </tspan><tspan fill="#79c0ff">openrouter</tspan><tspan fill="#8b949e"> &#183; </tspan><tspan fill="#f0f6fc">glm-5.2</tspan><tspan fill="#8b949e"> via </tspan><tspan fill="#f0f6fc">OpenCode</tspan></text>
      <text x="684" y="216"><tspan fill="#27c93f">$</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#27c93f">&#9611;</tspan></text>
    </g>
  </g>

  <!-- Chip strip -->
  <g font-family="Menlo, 'DejaVu Sans Mono', monospace" font-size="13.5">
    <text x="64" y="322" font-size="12" fill="#6e7681" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1">PROVIDERS</text>

    <g transform="translate(64,332)">
      <rect x="0" y="0" width="86" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="43" y="20" fill="#adbac7" text-anchor="middle">anthropic</text>

      <rect x="98" y="0" width="94" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="145" y="20" fill="#adbac7" text-anchor="middle">openrouter</text>

      <rect x="204" y="0" width="86" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="247" y="20" fill="#adbac7" text-anchor="middle">z.ai/glm</text>

      <rect x="302" y="0" width="62" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="333" y="20" fill="#adbac7" text-anchor="middle">kimi</text>

      <rect x="376" y="0" width="86" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="419" y="20" fill="#adbac7" text-anchor="middle">deepseek</text>

      <rect x="474" y="0" width="62" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="505" y="20" fill="#adbac7" text-anchor="middle">qwen</text>

      <rect x="548" y="0" width="102" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="599" y="20" fill="#adbac7" text-anchor="middle">modelscope</text>

      <rect x="662" y="0" width="98" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
      <text x="711" y="20" fill="#adbac7" text-anchor="middle">siliconflow</text>
    </g>

    <text x="850" y="322" font-size="12" fill="#6e7681" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1">AGENTS</text>
    <g transform="translate(850,332)">
      <rect x="0" y="0" width="112" height="30" rx="15" fill="#20262e" stroke="#3d444d"/>
      <text x="56" y="20" fill="#e6edf3" text-anchor="middle">claude-code</text>

      <rect x="124" y="0" width="54" height="30" rx="15" fill="#20262e" stroke="#3d444d"/>
      <text x="151" y="20" fill="#e6edf3" text-anchor="middle">kilo</text>

      <rect x="190" y="0" width="96" height="30" rx="15" fill="#20262e" stroke="#3d444d"/>
      <text x="238" y="20" fill="#e6edf3" text-anchor="middle">opencode</text>
    </g>
  </g>
</svg>
