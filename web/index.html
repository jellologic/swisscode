<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>swisscode</title>
    <!--
      The Swiss-cross mark, served same-origin from web/public/ (Vite copies it
      to the asset root, swisscode's server hands it back as image/svg+xml). A
      file rather than a data: URI so it is cacheable and the CSP stays 'self'.
    -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <!-- Match the browser chrome to whichever theme is active. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#08090a" />
    <!--
      The server rewrites this placeholder with a per-run token before serving.
      A meta tag rather than a cookie: a cookie rides along on cross-origin
      requests automatically, a value the page must read out of its own HTML
      cannot be read by anyone else.
    -->
    <meta name="swisscode-token" content="__SWISSCODE_TOKEN__" />
    <!--
      Resolve the theme BEFORE first paint.
      Inline and synchronous on purpose: doing this in React means the browser
      paints the default theme first and then repaints, which is the white flash
      every dark app has when it defers this to a component. Mirrors
      src/theme.ts; kept tiny so the duplication stays obviously correct.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('swisscode-theme')
          var pref = stored === 'light' || stored === 'dark' ? stored : 'system'
          var theme =
            pref === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref
          document.documentElement.setAttribute('data-theme', theme)
          document.documentElement.style.colorScheme = theme
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
