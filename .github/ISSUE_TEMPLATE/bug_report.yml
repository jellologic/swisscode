name: Bug report
description: Something launches wrong, warns wrong, or does not launch at all
labels: ['bug', 'needs triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. The single most useful thing you can attach is a
        `swisscode config doctor --json` report — it resolves the same profile,
        provider, binary and environment the launch does.

        **It is safe to paste.** The doctor never prints your API key: not
        masked, not truncated, not length-hinted, and anything a gateway echoes
        back is redacted before rendering. It *does* print binding paths, which
        contain directory names — redact those if they are sensitive.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you ran, and what it did instead of what you expected.
      placeholder: |
        `swisscode work --resume` launched against Anthropic instead of the
        profile's OpenRouter endpoint.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor report
      description: |
        Output of `swisscode config doctor --json` (or `--offline` if you would
        rather not make the network probes). Automatically formatted as code.
      render: json
    validations:
      required: false

  - type: dropdown
    id: agent
    attributes:
      label: Which agent
      options:
        - Claude Code (default)
        - Kilo
        - OpenCode
        - Not sure / not applicable
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Which provider
      description: openrouter, zai, modelscope, siliconflow, anthropic, custom…
      placeholder: openrouter
    validations:
      required: false

  - type: input
    id: versions
    attributes:
      label: Versions
      description: swisscode version, `node --version`, and your OS.
      placeholder: swisscode 0.2.1, node v24.13.1, macOS 15.5
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Before you post

        Please double-check that nothing below contains a credential — an API
        key, a token, or a base URL with credentials embedded in it. If one has
        already been posted anywhere, **revoke it**; editing a GitHub comment
        does not remove it from the edit history.

  - type: checkboxes
    id: hygiene
    attributes:
      label: Confirm
      options:
        - label: I searched existing issues for this
          required: true
        - label: I checked that no API key or token appears anywhere above
          required: true
